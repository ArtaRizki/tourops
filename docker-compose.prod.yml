services:
  db:
    image: postgres:16-alpine
    container_name: tour_ops_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tour_ops_2026
      POSTGRES_DB: tourops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tourops}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tour-ops

  redis:
    image: redis:7-alpine
    container_name: tour_ops_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tour-ops

  app:
    # build: .
    image: tourops:latest
    container_name: tour_ops_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:tour_ops_2026@tour_ops_db:5432/tourops
      SESSION_SECRET: ${SESSION_SECRET}
      PORT: ${PORT}
      NODE_ENV: production
      DISABLE_SECURE_COOKIE: ${DISABLE_SECURE_COOKIE}
      REDIS_URL: ${REDIS_URL:-redis://tour_ops_redis:6379}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-proj-z0m6N4Yd_D8j4e5P0q2y3s5t7u9v0x1}
      APP_URL: http://tour-ops-software.local
    ports:
      - "5022:${PORT}"
    networks:
      - tour-ops

volumes:
  postgres_data:
  redis_data:

networks:
  tour-ops:
    driver: bridge
