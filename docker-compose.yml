services:
  db:
    image: postgres:16-alpine
    container_name: tour_ops_db
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tourops}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tour-ops

  app:
    # build: .
    image: tourops:v1.0
    container_name: tour_ops_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      PORT: ${PORT}
      NODE_ENV: production
    ports:
      - "5022:${PORT}"
    networks:
      - tour-ops

volumes:
  postgres_data:

networks:
  tour-ops:
    driver: bridge
